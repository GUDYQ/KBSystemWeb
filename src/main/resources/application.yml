spring:
  application:
    name: KBSystemProject
  main:
    web-application-type: reactive
  datasource:
    hikari:
      jdbc-url: jdbc:postgresql://localhost:5432/knowledge_base
      username: postgres
      password: pgvector
      driver-class-name: org.postgresql.Driver

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/knowledge_base
    username: postgres
    password: pgvector
  config:
    password-key:
      salt-length: 16
      hash-iterations: 1000
      hash-key-length: 256
      key-algorithm: PBKDF2WithHmacSHA256
      secret-code: C2A50163-E64D-9A92-A7E7-862E7ADD05BE
  data:
    redis:
      host: localhost
      port: 6379
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: my-reactive-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${AI_DASHSCOPE_API_KEY}
      chat:
        options:
          model: qwen-flash
      embedding:
        options:
          model: text-embedding-v2

app:
  kafka:
    topics:
      events: my-topic

