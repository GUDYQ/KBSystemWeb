spring:
  application:
    name: KBSystemProject
  main:
    web-application-type: reactive
  datasource:
    hikari:
      jdbc-url: jdbc:postgresql://localhost:5432/knowledge_base
      username: postgres
      password: pgvector
      driver-class-name: org.postgresql.Driver

  r2dbc:
    url: r2dbc:postgresql://localhost:5432/knowledge_base
    username: postgres
    password: pgvector
  config:
    password-key:
      salt-length: 16
      hash-iterations: 1000
      hash-key-length: 256
      key-algorithm: PBKDF2WithHmacSHA256
      secret-code: C2A50163-E64D-9A92-A7E7-862E7ADD05BE
  data:
    redis:
      host: localhost
      port: 6379
      password: redis
  kafka:
    bootstrap-servers: localhost:9092
    producer:
      retries: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

    consumer:
      group-id: my-reactive-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  ai:
    openai:
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${AI_DASHSCOPE_API_KEY}
      embedding: none
      chat:
        enabled: true # 启用 OpenAI 模型
        options:
          model: qwen-flash
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma4:e4b
      embedding:
        model: nomic-embed-text-v2-moe
        dimension: 768
    mcp:
      client:
        enabled: true
        name: ocr-mcp-client
        type: ASYNC
        stdio:
          servers-configuration: classpath:mcp-server.json


resilience4j:
  circuitbreaker:
    configs:
      default:
        # 滑动窗口类型：基于调用次数
        slidingWindowType: COUNT_BASED
        # 滑动窗口大小：最近 10 次请求
        slidingWindowSize: 10
        # 最小请求次数：达到 5 次才开始计算失败率
        minimumNumberOfCalls: 5
        # 失败率阈值：超过 50% 打开熔断
        failureRateThreshold: 50
        # 慢调用判定：AI 接口超过 5 秒视为慢调用
        slowCallDurationThreshold: 5s
        # 慢调用比例：超过 50% 慢调用打开熔断
        slowCallRateThreshold: 50
        # 熔断器打开后等待时间：10秒后进入半开状态尝试探测
        waitDurationInOpenState: 10s
        # 半开状态允许的探测请求数
        permittedNumberOfCallsInHalfOpenState: 3

management:
  endpoints:
    web:
      exposure:
        include: health,info,circuitbreakers,metrics
  endpoint:
    health:
      show-details: always
  health:
    circuitbreakers:
      enabled: true

memory:
  short-term:
    max-turns: 10
    ttl-hours: 72
  long-term:
    top-k: 5
    similarity-threshold: 0.45
    time-decay-lambda: 0.03
  summary:
    enabled: true
    trigger-turns: 20
  concurrency:
    enabled: true
    lock-wait-millis: 3000
    lock-lease-millis: 15000
  request:
    processing-lease-seconds: 600
  async:
    fixed-delay-millis: 3000
    batch-size: 20
    lease-seconds: 120
    retry-delay-seconds: 30

ai-learning:
  intent:
    llm-fallback-enabled: false
    llm-confidence-threshold: 0.65
    follow-up-prompt-length-threshold: 24
  hanlp:
    enabled: ${HANLP_ENABLED:false}
    base-url: https://www.hanlp.com/api
    auth: ${HANLP_AUTH:}
    language: zh
    top-keywords: 6
  query-enhancement:
    enabled: true
    llm-enabled: true
    rewrite-enabled: true
    multi-query-enabled: true
    multi-query-count: 3
    include-original: true
    max-queries: 4
    target-search-system: learning knowledge base

  kafka:
    topics:
      events: my-topic

